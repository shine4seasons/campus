<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết sản phẩm — Campus Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background: #F7F8FC; }

    .detail-layout {
      max-width: 1100px; margin: 0 auto;
      padding: 28px 24px 60px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px; align-items: start;
    }

    /* ── Gallery ─────────────────────── */
    .gallery { position: sticky; top: 80px; }
    .gallery-main {
      aspect-ratio: 1;
      border-radius: 20px;
      overflow: hidden;
      background: #EBF0FF;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; margin-bottom: 12px;
      border: 1px solid #E4E7F2;
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumbs { display: flex; gap: 8px; }
    .gallery-thumb {
      width: 64px; height: 64px; border-radius: 10px;
      overflow: hidden; cursor: pointer;
      border: 2px solid transparent;
      background: #EBF0FF; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .gallery-thumb.active { border-color: #1B5EFF; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Product info ────────────────── */
    .info-section { display: flex; flex-direction: column; gap: 20px; }

    .product-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700;
    }
    .badge-cat   { background: #EBF0FF; color: #1B5EFF; }
    .badge-new   { background: #D1FAE5; color: #065F46; }
    .badge-like-new { background: #DBEAFE; color: #1E40AF; }
    .badge-good  { background: #FEF3C7; color: #92400E; }
    .badge-fair  { background: #FEE2E2; color: #991B1B; }
    .badge-sold  { background: #FEE2E2; color: #991B1B; }
    .badge-hidden { background: #F0F1F8; color: #8890B0; }

    .product-title { font-size: clamp(20px,3vw,28px); font-weight: 900; color: #0D0F1A; letter-spacing: -0.02em; line-height: 1.2; }
    .product-price { font-size: 32px; font-weight: 900; color: #1B5EFF; letter-spacing: -0.03em; margin: 8px 0; }
    .product-meta  { display: flex; gap: 16px; font-size: 12px; color: #8890B0; flex-wrap: wrap; }
    .product-meta span { display: flex; align-items: center; gap: 5px; }

    .product-desc {
      font-size: 14px; color: #3D4258; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
    }

    .section-title { font-size: 13px; font-weight: 800; color: #0D0F1A; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }

    /* ── CTA sidebar ──────────────────── */
    .cta-card {
      background: #fff; border: 1px solid #E4E7F2; border-radius: 20px;
      padding: 24px; position: sticky; top: 80px;
    }
    .cta-price { font-size: 28px; font-weight: 900; color: #1B5EFF; letter-spacing: -0.03em; margin-bottom: 20px; }
    .btn-contact {
      width: 100%; padding: 14px; border-radius: 12px;
      background: #1B5EFF; color: #fff;
      font-size: 15px; font-weight: 800; font-family: inherit;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: all 0.2s; margin-bottom: 10px;
    }
    .btn-contact:hover { background: #1348D6; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(27,94,255,0.35); }
    .btn-interested {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1.5px solid #E4E7F2; background: #fff;
      color: #3D4258; font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-interested:hover { background: #FFF0F0; border-color: #FFAAAA; color: #E84040; }
    .btn-interested.active { background: #FFF0F0; border-color: #E84040; color: #E84040; }

    /* Sold overlay */
    .sold-overlay {
      background: rgba(232,64,64,0.08); border: 1px solid rgba(232,64,64,0.2);
      border-radius: 12px; padding: 14px 16px; text-align: center;
      color: #E84040; font-size: 14px; font-weight: 700; margin-bottom: 14px;
    }

    /* Owner actions */
    .owner-actions {
      display: flex; gap: 10px; margin-top: 14px;
    }
    .btn-edit {
      flex: 1; padding: 10px; border-radius: 10px;
      border: 1.5px solid #1B5EFF; color: #1B5EFF;
      background: #EBF0FF; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-edit:hover { background: #D6E4FF; }
    .btn-mark-sold {
      flex: 1; padding: 10px; border-radius: 10px;
      border: 1.5px solid #0DAF6E; color: #0DAF6E;
      background: #E8FBF3; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-mark-sold:hover { background: #D1F5E8; }
    .btn-delete {
      padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid #E4E7F2; color: #8890B0;
      background: #fff; font-size: 13px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-delete:hover { background: #FEE2E2; border-color: #E84040; color: #E84040; }

    /* Seller card */
    .seller-card {
      background: #F7F8FC; border: 1px solid #E4E7F2; border-radius: 14px;
      padding: 16px;
    }
    .seller-row { display: flex; align-items: center; gap: 12px; }
    .seller-avatar {
      width: 44px; height: 44px; border-radius: 50%; overflow: hidden;
      background: #EBF0FF; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: #1B5EFF;
    }
    .seller-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .seller-name  { font-size: 14px; font-weight: 800; color: #0D0F1A; }
    .seller-uni   { font-size: 12px; color: #8890B0; margin-top: 2px; }
    .seller-stats { display: flex; gap: 16px; margin-top: 12px; }
    .stat-item { text-align: center; }
    .stat-num  { font-size: 16px; font-weight: 900; color: #0D0F1A; }
    .stat-lbl  { font-size: 11px; color: #8890B0; }

    /* Location */
    .location-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #F7F8FC; border: 1px solid #E4E7F2;
      border-radius: 8px; padding: 8px 12px;
      font-size: 13px; color: #3D4258;
    }

    /* Skeleton loader */
    .skeleton { background: linear-gradient(90deg, #F0F1F8 25%, #E4E7F2 50%, #F0F1F8 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* Toast */
    #toast-wrap { position:fixed; bottom:24px; right:24px; z-index:2000; display:flex; flex-direction:column; gap:8px; }
    .toast { display:flex; align-items:center; gap:10px; padding:12px 18px; border-radius:12px;
      font-size:14px; font-weight:600; box-shadow:0 8px 32px rgba(13,15,26,0.15);
      animation:slideIn 0.3s cubic-bezier(0.16,1,0.3,1); max-width:320px; }
    .toast.ok  { background:#0D0F1A; color:#fff; }
    .toast.err { background:#E84040; color:#fff; }
    @keyframes slideIn { from { opacity:0; transform:translateX(20px); } }

    @media (max-width: 768px) {
      .detail-layout { grid-template-columns: 1fr; }
      .gallery { position: static; }
      .cta-card { position: static; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="detail-layout" id="detail-layout">
    <!-- Filled by JS -->
    <div style="grid-column:1/-1;text-align:center;padding:60px;color:#8890B0;" id="loading-state">
      <div class="skeleton" style="height:400px;border-radius:20px;margin-bottom:16px;"></div>
    </div>
  </div>

  <div id="toast-wrap"></div>

  <script type="module">
    import { auth }         from '../js/auth.js';
    import { api }          from '../js/api.js';
    import { renderNavbar } from '../js/components/navbar.js';
    import { ROUTES }       from '../js/config.js';

    renderNavbar();

    const id = new URLSearchParams(location.search).get('id');
    if (!id) { window.location.href = ROUTES.HOME; }

    const fmt = n => new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n);
    const CAT_LABEL = { books:'Sách vở', electronics:'Điện tử', clothing:'Quần áo', furniture:'Nội thất', 'daily-needs':'Đồ dùng', sports:'Thể thao', gaming:'Giải trí', other:'Khác' };
    const CAT_EMOJI = { books:'📚', electronics:'💻', clothing:'👕', furniture:'🛋️', 'daily-needs':'🧴', sports:'⚽', gaming:'🎮', other:'📦' };
    const COND_INFO = { new:['✨','Mới','badge-new'], 'like-new':['💎','Như mới','badge-like-new'], good:['👍','Tốt','badge-good'], fair:['🔧','Khá','badge-fair'] };
    const COND_LBL  = { new:'Mới', 'like-new':'Như mới', good:'Tốt', fair:'Khá' };

    let product = null;
    let currentImg = 0;
    let interested = false;

    (async () => {
      try {
        const res = await api.get(`/products/${id}`);
        product   = res.data;
        renderProduct();
      } catch {
        document.getElementById('detail-layout').innerHTML =
          `<div style="grid-column:1/-1;text-align:center;padding:80px;color:#8890B0;">
            <div style="font-size:48px;margin-bottom:16px;">🔍</div>
            <p style="font-size:18px;font-weight:700;color:#0D0F1A;">Không tìm thấy sản phẩm</p>
            <p style="margin-top:8px;">Sản phẩm đã bị xóa hoặc không tồn tại.</p>
            <a href="${ROUTES.HOME}" style="display:inline-block;margin-top:20px;padding:12px 28px;background:#1B5EFF;color:#fff;border-radius:12px;font-weight:700;">Về trang chủ</a>
          </div>`;
      }
    })();

    function renderProduct() {
      const p = product;
      const user     = auth.getUser();
      const isOwner  = user && (String(p.seller?._id || p.seller) === String(user._id));
      const isSold   = p.status === 'sold';
      const cond     = COND_INFO[p.condition] || ['📦', p.condition, 'badge-new'];

      // Update page title
      document.title = `${p.title} — Campus Marketplace`;

      // Gallery
      const thumbsHtml = (p.images?.length ? p.images : [''])
        .map((url, i) => url
          ? `<div class="gallery-thumb ${i === 0 ? 'active' : ''}" onclick="setImg(${i})"><img src="${url}" alt="ảnh ${i+1}"></div>`
          : ''
        ).join('');

      const mainImgHtml = p.images?.[0]
        ? `<img id="main-img" src="${p.images[0]}" alt="${p.title}" onerror="this.parentElement.innerHTML='<span style=font-size:80px>${CAT_EMOJI[p.category]||'📦'}</span>'">`
        : `<span style="font-size:80px;">${CAT_EMOJI[p.category] || '📦'}</span>`;

      // CTA / Owner actions
      let ctaHtml = '';
      if (isSold) {
        ctaHtml = `<div class="sold-overlay">🔒 Sản phẩm này đã được bán</div>`;
      } else if (isOwner) {
        ctaHtml = `
          <div class="owner-actions">
            <button class="btn-edit" onclick="editProduct()">✏️ Chỉnh sửa</button>
            <button class="btn-mark-sold" onclick="markSold()">✓ Đánh dấu đã bán</button>
            <button class="btn-delete" onclick="deleteProduct()">🗑</button>
          </div>
        `;
      } else {
        ctaHtml = `
          <button class="btn-contact" onclick="contactSeller()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            Nhắn tin người bán
          </button>
          <button class="btn-interested ${interested ? 'active' : ''}" id="btn-interested" onclick="toggleInterested()">
            <span id="heart-icon">${interested ? '❤️' : '🤍'}</span>
            Quan tâm <span id="interested-count">(${p.interested || 0})</span>
          </button>
        `;
      }

      // Seller info
      const seller     = p.seller || {};
      const sellerName = seller.nickname || seller.name || 'Ẩn danh';
      const sellerAvatar = seller.avatar
        ? `<img src="${seller.avatar}" alt="${sellerName}">`
        : `<span>${sellerName[0]?.toUpperCase() || '?'}</span>`;

      const joinDate = seller.createdAt
        ? new Date(seller.createdAt).toLocaleDateString('vi-VN', { month:'long', year:'numeric' })
        : '';

      // Render
      document.getElementById('detail-layout').innerHTML = `
        <!-- Gallery -->
        <div class="gallery">
          <div class="gallery-main">${mainImgHtml}</div>
          ${p.images?.length > 1 ? `<div class="gallery-thumbs">${thumbsHtml}</div>` : ''}
        </div>

        <!-- Right column -->
        <div class="info-section">

          <!-- CTA card -->
          <div class="cta-card">
            <div class="product-badges">
              <span class="badge badge-cat">${CAT_LABEL[p.category] || p.category}</span>
              <span class="badge ${cond[2]}">${cond[0]} ${cond[1]}</span>
              ${isSold ? '<span class="badge badge-sold">Đã bán</span>' : ''}
            </div>
            <div class="product-title">${p.title}</div>
            <div class="cta-price">${fmt(p.price)}</div>
            <div class="product-meta" style="margin-bottom:16px;">
              <span>👁 ${p.views || 0} lượt xem</span>
              <span>❤️ ${p.interested || 0} quan tâm</span>
              <span>🕐 ${timeAgo(p.createdAt)}</span>
            </div>
            ${ctaHtml}
          </div>

          <!-- Description -->
          <div>
            <div class="section-title">Mô tả sản phẩm</div>
            <p class="product-desc">${escapeHtml(p.description)}</p>
          </div>

          <!-- Location -->
          ${p.location?.address ? `
          <div>
            <div class="section-title">Địa điểm giao nhận</div>
            <div class="location-chip">📍 ${escapeHtml(p.location.address)}</div>
          </div>` : ''}

          <!-- Seller -->
          <div>
            <div class="section-title">Người bán</div>
            <div class="seller-card">
              <div class="seller-row">
                <div class="seller-avatar">${sellerAvatar}</div>
                <div>
                  <div class="seller-name">${sellerName}</div>
                  <div class="seller-uni">${seller.university || ''} ${joinDate ? '· Tham gia ' + joinDate : ''}</div>
                </div>
              </div>
              <div class="seller-stats">
                <div class="stat-item"><div class="stat-num">⭐ ${(seller.rating||5).toFixed(1)}</div><div class="stat-lbl">Đánh giá</div></div>
                <div class="stat-item"><div class="stat-num">${seller.totalSales || 0}</div><div class="stat-lbl">Đã bán</div></div>
                <div class="stat-item"><div class="stat-num">${seller.ratingCount || 0}</div><div class="stat-lbl">Nhận xét</div></div>
              </div>
            </div>
          </div>

        </div>
      `;
    }

    // ── Gallery interaction ────────────────────────────
    window.setImg = function (i) {
      currentImg = i;
      const imgs = product.images || [];
      const main = document.getElementById('main-img');
      if (main && imgs[i]) main.src = imgs[i];
      document.querySelectorAll('.gallery-thumb').forEach((t, j) => {
        t.classList.toggle('active', j === i);
      });
    };

    // ── Actions ────────────────────────────────────────
    window.contactSeller = function () {
      if (!auth.isAuthenticated()) {
        toast('Vui lòng đăng nhập để nhắn tin', 'err');
        setTimeout(() => window.location.href = ROUTES.LOGIN, 900);
        return;
      }
      toast('Tính năng chat sắp ra mắt!', 'ok');
    };

    window.toggleInterested = async function () {
      if (!auth.isAuthenticated()) {
        toast('Vui lòng đăng nhập', 'err');
        return;
      }
      interested = !interested;
      try {
        const res = await api.post(`/products/${id}/interested`);
        document.getElementById('heart-icon').textContent = interested ? '❤️' : '🤍';
        document.getElementById('interested-count').textContent = `(${res.interested})`;
        document.getElementById('btn-interested').classList.toggle('active', interested);
      } catch { interested = !interested; }
    };

    window.editProduct = function () {
      window.location.href = `/pages/sell.html?id=${id}`;
    };

    window.markSold = async function () {
      if (!confirm('Đánh dấu sản phẩm này là đã bán?')) return;
      try {
        await api.patch(`/products/${id}`, { status: 'sold' });
        toast('Đã cập nhật trạng thái!', 'ok');
        setTimeout(() => location.reload(), 1000);
      } catch (err) { toast(err.message, 'err'); }
    };

    window.deleteProduct = async function () {
      if (!confirm('Xóa sản phẩm này? Hành động không thể hoàn tác.')) return;
      try {
        await api.delete(`/products/${id}`);
        toast('Đã xóa sản phẩm', 'ok');
        setTimeout(() => window.location.href = ROUTES.HOME, 1200);
      } catch (err) { toast(err.message, 'err'); }
    };

    // ── Utils ──────────────────────────────────────────
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1)   return 'Vừa xong';
      if (m < 60)  return `${m} phút trước`;
      const h = Math.floor(m / 60);
      if (h < 24)  return `${h} giờ trước`;
      const d = Math.floor(h / 24);
      if (d < 30)  return `${d} ngày trước`;
      const mo = Math.floor(d / 30);
      return `${mo} tháng trước`;
    }

    function escapeHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function toast(msg, type = 'ok') {
      const c = document.getElementById('toast-wrap');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `${type === 'ok' ? '✓' : '✕'} ${msg}`;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
    }
  </script>
</body>
</html>
