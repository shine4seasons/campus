<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đang xác thực — Campus Marketplace</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#070D1F; min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      font-family:'Plus Jakarta Sans', system-ui, sans-serif; gap:16px;
    }
    .logo { font-size:15px; color:rgba(255,255,255,0.3); letter-spacing:0.1em; font-weight:600; }
    .spinner {
      width:40px; height:40px;
      border:3px solid rgba(255,255,255,0.07);
      border-top-color:#1B5EFF;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg { color:rgba(255,255,255,0.35); font-size:14px; }
    .err-card {
      background:rgba(220,38,38,0.1); border:1px solid rgba(220,38,38,0.2);
      border-radius:16px; padding:28px 32px; text-align:center;
      max-width:340px; display:none;
    }
    .err-card p { color:#FCA5A5; margin-bottom:16px; font-size:15px; }
    .err-card a {
      display:inline-block; padding:10px 24px; background:#1B5EFF;
      color:#fff; border-radius:10px; font-weight:700; font-size:14px;
    }
  </style>
</head>
<body>
  <div class="logo">📚 Campus Marketplace</div>
  <div class="spinner" id="spinner"></div>
  <p class="msg" id="msg">Đang xác thực...</p>
  <div class="err-card" id="err-card">
    <p id="err-text">Đăng nhập thất bại.</p>
    <a href="/pages/login.html">Thử lại</a>
  </div>

<script type="module">
  import { auth }   from '../js/auth.js';
  import { ROUTES } from '../js/config.js';

  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const error  = params.get('error');

  function showError(msg) {
    document.getElementById('spinner').style.display  = 'none';
    document.getElementById('msg').style.display      = 'none';
    document.getElementById('err-text').textContent   = msg;
    document.getElementById('err-card').style.display = 'block';
  }

  // Bọc trong async IIFE — top-level `return` là cú pháp bất hợp lệ trong ES module
  (async () => {
    if (error || !token) {
      showError('Đăng nhập thất bại. Vui lòng thử lại.');
      return; // return bên trong function → hợp lệ
    }

    document.getElementById('msg').textContent = 'Đang tải thông tin tài khoản...';

    try {
      const user = await auth.loginWithToken(token);

      if (!user?.profileComplete) {
        // Chưa hoàn thiện profile → về login?step=setup (không cần token, đã lưu rồi)
        window.location.replace(`${ROUTES.LOGIN}?step=setup`);
      } else {
        // Profile đầy đủ → về trang chủ (hoặc trang user muốn vào trước đó)
        const redirectTo = sessionStorage.getItem('redirect_after_login');
        sessionStorage.removeItem('redirect_after_login');
        window.location.replace(redirectTo || ROUTES.HOME);
      }

    } catch (err) {
      console.error('Auth error:', err);
      showError('Không thể lấy thông tin tài khoản. Vui lòng thử lại.');
    }
  })();
</script>
</body>
</html>
